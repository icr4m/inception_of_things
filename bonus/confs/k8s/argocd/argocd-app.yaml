apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-app
  namespace: argocd
spec:
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: http://gitlab.gitlab.svc.cluster.local/root/iot
    targetRevision: main
    path: bonus/confs/k8s/app
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      enabled: true
