apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-app
  namespace: argocd
spec:
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/Anicet78/agruet_IoT
    targetRevision: main
    path: bonus/confs/k8s/app
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      enabled: true
