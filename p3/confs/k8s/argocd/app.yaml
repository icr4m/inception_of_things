apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-app
  namespace: argocd
spec:
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/icr4m/inception_of_things
    targetRevision: p3
    path: p3/confs/k8s/app
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      enabled: true
data:
  timeout.reconciliation: 5s
