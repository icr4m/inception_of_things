apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: dev
spec:
  type: LoadBalancer
  selector:
    app: playground
  ports:
    - port: 8080
      targetPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: argocd
  namespace: argocd
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - port: 8081
      targetPort: 8080
