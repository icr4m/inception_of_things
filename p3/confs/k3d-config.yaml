apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: cluster-p3
servers: 1
agents: 1
ports:
  - port: 8080:8080
  - port: 8081:8081
files:
  - source: ./k8s/namespace.yaml
    destination: /var/lib/rancher/k3s/server/manifests/namespace.yaml
    nodeFilters:
      - "server:*"
  - source: ./k8s/deployment.yaml
    destination: /var/lib/rancher/k3s/server/manifests/deployment.yaml
    nodeFilters:
      - "server:*"
  - source: ./k8s/service.yaml
    destination: /var/lib/rancher/k3s/server/manifests/service.yaml
    nodeFilters:
      - "server:*"
  - source: ./k8s/argocd-helmchart.yaml
    destination: /var/lib/rancher/k3s/server/manifests/argocd-helmchart.yaml
    nodeFilters:
      - "server:*"
options:
  k3d:
    wait: true
  k3s:
    extraArgs:
      - arg: "--disable=traefik"
        nodeFilters:
          - "server:*"
